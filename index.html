<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Ledger</title>
<style>
  :root {
    --bg-color: #0d0d0d;
    --card-bg: #18181a;
    --card-border: #26262a;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --accent-cream: #f2efe9;
    --accent-dark: #000000;
    --dot-color: #e5c158;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    padding: 20px 16px 40px;
    max-width: 600px;
    margin: 0 auto;
    font-variant-numeric: normal;
    font-feature-settings: "zero" 0;
  }

  /* Navigation Tabs */
  .nav-tabs {
    display: flex;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }

  .nav-btn {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .nav-btn.active {
    background: var(--accent-cream);
    color: var(--accent-dark);
  }

  /* Cards & Layout */
  .lg-panel {
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .lg-panel.active {
    display: flex;
  }

  .lg-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  /* Forms & Inputs */
  .lg-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input, select {
    width: 100%;
    padding: 12px 14px;
    background: #000000;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    font-variant-numeric: normal;
    font-feature-settings: 'zero' 0;
  }

  input:focus, select:focus {
    border-color: var(--text-secondary);
  }

  .lg-btn {
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .lg-btn.primary {
    background: var(--accent-cream);
    color: var(--accent-dark);
  }

  .lg-btn.secondary {
    background: #2c2c2e;
    color: var(--text-primary);
  }

  .lg-btn:hover {
    opacity: 0.9;
  }

  /* Overview Budget Display */
  .stat-box {
    text-align: center;
    padding: 12px 0;
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  /* Calendar Styling */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
  }

  .cal-day-name {
    font-size: 11px;
    color: var(--text-secondary);
    padding-bottom: 4px;
  }

  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #101012;
    font-size: 13px;
    position: relative;
  }

  .cal-cell.empty {
    background: transparent;
  }

  .cal-dot {
    width: 4px;
    height: 4px;
    background-color: var(--dot-color);
    border-radius: 50%;
    position: absolute;
    bottom: 4px;
  }

  /* Segmented Pill Tabs for Bills */
  .pill-tabs {
    display: flex;
    background-color: #000000;
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 16px;
    border: 1px solid var(--card-border);
  }

  .pill-tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .pill-tab.active {
    background-color: var(--accent-cream);
    color: var(--accent-dark);
  }

  /* Output Item Cards */
  .list-wrapper {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }

  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #101012;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #1f1f22;
  }

  .item-title {
    font-weight: 600;
    font-size: 15px;
  }

  .item-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .item-val {
    font-weight: 600;
    font-size: 15px;
  }
</style>
</head>
<body>

  <!-- Top Navigation Switcher -->
  <div class="nav-tabs">
    <button class="nav-btn active" onclick="switchMainTab('overview', this)">Overview</button>
    <button class="nav-btn" onclick="switchMainTab('bills', this)">Bills</button>
    <button class="nav-btn" onclick="switchMainTab('accounts', this)">Accounts</button>
  </div>

  <!-- OVERVIEW PANEL -->
  <div class="lg-panel active" id="panel-overview">
    <!-- Total Budget Display -->
    <div class="lg-card">
      <div class="stat-box">
        <div class="stat-label">Total Budget</div>
        <div class="stat-value" id="lg-total-budget">$0.00</div>
      </div>
    </div>

    <!-- Dynamic Calendar View (Read-only display) -->
    <div class="lg-card">
      <h2>Calendar</h2>
      <div class="cal-header" id="cal-month-year">July 2026</div>
      <div class="cal-grid" id="lg-calendar-grid">
        <!-- Grid injected via JS -->
      </div>
    </div>
  </div>

  <!-- BILLS PANEL -->
  <div class="lg-panel" id="panel-bills">
    <div class="lg-card">
      <!-- Pill Tabs -->
      <div class="pill-tabs">
        <button class="pill-tab active" id="tab-btn-upcoming" onclick="switchBillTab('upcoming')">Upcoming</button>
        <button class="pill-tab" id="tab-btn-recurring" onclick="switchBillTab('recurring')">Recurring</button>
      </div>

      <!-- Add Bill Form -->
      <div class="lg-form">
        <div class="field-group">
          <label>Bill Name</label>
          <input type="text" id="lg-bill-name" placeholder="e.g. Electricity / Netflix">
        </div>
        <div class="field-group">
          <label>Amount</label>
          <input type="number" id="lg-bill-amount" placeholder="0.00">
        </div>
        <div class="field-group">
          <label>Due Date</label>
          <input type="date" id="lg-bill-date">
        </div>
        <div class="field-group">
          <label>Frequency</label>
          <select id="lg-bill-freq">
            <option value="once">Once</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <button class="lg-btn primary" onclick="addBill()" style="margin-top: 6px;">Add Bill</button>
      </div>

      <!-- Bill List -->
      <div class="list-wrapper" id="lg-bills-list"></div>
    </div>
  </div>

  <!-- ACCOUNTS PANEL -->
  <div class="lg-panel" id="panel-accounts">
    <div class="lg-card">
      <h2>Accounts</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Bank</label>
          <input type="text" id="lg-acc-bank" placeholder="e.g. First Citizens">
        </div>
        <div class="field-group">
          <label>Account Number</label>
          <input type="text" id="lg-acc-number" placeholder="e.g. 000000000000">
        </div>
        <button class="lg-btn secondary" onclick="addAccount()" style="margin-top: 6px;">Add Account</button>
      </div>

      <!-- Accounts List -->
      <div class="list-wrapper" id="lg-accounts-list"></div>
    </div>
  </div>

<script>
  let bills = [];
  let accounts = [];
  let activeBillTab = 'upcoming';

  // Navigation Controller
  function switchMainTab(tabId, btnElement) {
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.lg-panel').forEach(p => p.classList.remove('active'));
    
    btnElement.classList.add('active');
    document.getElementById(`panel-${tabId}`).classList.add('active');

    if (tabId === 'overview') {
      renderCalendar();
      updateBudget();
    }
  }

  // Bill Pill Tabs Toggle
  function switchBillTab(type) {
    activeBillTab = type;
    document.getElementById('tab-btn-upcoming').classList.toggle('active', type === 'upcoming');
    document.getElementById('tab-btn-recurring').classList.toggle('active', type === 'recurring');
    renderBills();
  }

  // Add Bill Functionality
  function addBill() {
    const name = document.getElementById('lg-bill-name').value.trim();
    const amount = parseFloat(document.getElementById('lg-bill-amount').value) || 0;
    const date = document.getElementById('lg-bill-date').value;
    const freq = document.getElementById('lg-bill-freq').value;

    if (!name || !date || !amount) return;

    bills.push({ id: Date.now(), name, amount, date, freq });

    document.getElementById('lg-bill-name').value = '';
    document.getElementById('lg-bill-amount').value = '';
    document.getElementById('lg-bill-date').value = '';

    renderBills();
    updateBudget();
  }

  // Render Bills list filtered by active pill tab
  function renderBills() {
    const list = document.getElementById('lg-bills-list');
    list.innerHTML = '';

    const filtered = bills.filter(b => activeBillTab === 'recurring' ? b.freq !== 'once' : b.freq === 'once');

    filtered.forEach(b => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div>
          <div class="item-title">${b.name}</div>
          <div class="item-sub">${b.date} • ${b.freq.charAt(0).toUpperCase() + b.freq.slice(1)}</div>
        </div>
        <div class="item-val">$${b.amount.toFixed(2)}</div>
      `;
      list.appendChild(item);
    });
  }

  // Add Account Functionality (Bank & Account Number only)
  function addAccount() {
    const bank = document.getElementById('lg-acc-bank').value.trim();
    const number = document.getElementById('lg-acc-number').value.trim();

    if (!bank || !number) return;

    accounts.push({ id: Date.now(), bank, number });

    document.getElementById('lg-acc-bank').value = '';
    document.getElementById('lg-acc-number').value = '';

    renderAccounts();
  }

  function renderAccounts() {
    const list = document.getElementById('lg-accounts-list');
    list.innerHTML = '';

    accounts.forEach(a => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div>
          <div class="item-title">${a.bank}</div>
          <div class="item-sub">Acc: ${a.number}</div>
        </div>
      `;
      list.appendChild(item);
    });
  }

  // Calculate and display total budget
  function updateBudget() {
    const total = bills.reduce((sum, b) => sum + b.amount, 0);
    document.getElementById('lg-total-budget').innerText = `$${total.toFixed(2)}`;
  }

  // Render Calendar and sync bill dots
  function renderCalendar() {
    const grid = document.getElementById('lg-calendar-grid');
    grid.innerHTML = '';

    const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    dayNames.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.innerText = d;
      grid.appendChild(el);
    });

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById('cal-month-year').innerText = `${monthNames[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      cell.innerText = day;

      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const hasBill = bills.some(b => b.date === dateStr);

      if (hasBill) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot';
        cell.appendChild(dot);
      }

      grid.appendChild(cell);
    }
  }

  // Initial setup call
  renderCalendar();
</script>
</body>
</html>
