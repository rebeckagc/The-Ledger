<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Ledger</title>
<!-- Chart.js for Overview Pie Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg-color: #0d0d0d;
    --card-bg: #18181a;
    --card-border: #26262a;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --accent-cream: #f2efe9;
    --accent-dark: #000000;
    --progress-bg: #2c2c2e;
    --danger-red: #ff453a;
    --success-green: #34c759;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    padding: 20px 16px 100px;
    max-width: 600px;
    margin: 0 auto;
    font-variant-numeric: normal;
    font-feature-settings: "zero" 0;
  }

  /* Fixed Bottom Navigation Bar */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #141416;
    border-top: 1px solid var(--card-border);
    padding: 10px 16px 20px;
    display: flex;
    justify-content: space-around;
    z-index: 1000;
    max-width: 600px;
    margin: 0 auto;
  }

  .nav-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .nav-btn.active {
    background: var(--accent-cream);
    color: var(--accent-dark);
  }

  /* Panels & Cards */
  .lg-panel {
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .lg-panel.active {
    display: flex;
  }

  .lg-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  /* Financial Overview Stat Display */
  .stat-box {
    text-align: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--card-border);
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
    text-align: center;
  }

  .sub-stat-label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .sub-stat-value {
    font-size: 18px;
    font-weight: 600;
    margin-top: 2px;
  }

  .income-text { color: var(--success-green); }
  .expense-text { color: var(--danger-red); }

  /* Calendar */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
  }

  .cal-day-name {
    font-size: 11px;
    color: var(--text-secondary);
    padding-bottom: 4px;
  }

  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #101012;
    font-size: 13px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .cal-cell:hover:not(.empty) {
    background: #1f1f24;
  }

  .cal-cell.empty {
    background: transparent;
    cursor: default;
  }

  .cal-dots-container {
    display: flex;
    gap: 2px;
    position: absolute;
    bottom: 3px;
  }

  .cal-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
  }

  /* Pie Chart Container */
  .chart-container {
    position: relative;
    max-width: 260px;
    margin: 0 auto;
  }

  /* Forms & Inputs */
  .lg-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-row {
    display: flex;
    gap: 10px;
  }

  .field-row .field-group {
    flex: 1;
  }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input, select {
    width: 100%;
    padding: 12px 14px;
    background: #000000;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    font-variant-numeric: normal;
    font-feature-settings: 'zero' 0;
  }

  input[type="color"] {
    padding: 4px;
    height: 46px;
    cursor: pointer;
  }

  input:focus, select:focus {
    border-color: var(--text-secondary);
  }

  .lg-btn {
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .lg-btn.primary {
    background: var(--accent-cream);
    color: var(--accent-dark);
  }

  .lg-btn.secondary {
    background: #2c2c2e;
    color: var(--text-primary);
  }

  .lg-btn.danger {
    background: var(--danger-red);
    color: #ffffff;
  }

  .lg-btn.edit-sm {
    background: #2c2c2e;
    color: var(--text-primary);
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
  }

  .lg-btn:hover { opacity: 0.9; }

  /* Segmented Pill Tabs */
  .pill-tabs {
    display: flex;
    background-color: #000000;
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 16px;
    border: 1px solid var(--card-border);
  }

  .pill-tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .pill-tab.active {
    background-color: var(--accent-cream);
    color: var(--accent-dark);
  }

  /* Dynamic Budget Categories */
  .budget-item {
    background: #101012;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #1f1f22;
    margin-bottom: 12px;
  }

  .budget-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .cat-dot-label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .progress-bar-bg {
    width: 100%;
    height: 8px;
    background: var(--progress-bg);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  /* List Items */
  .list-wrapper {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }

  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #101012;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #1f1f22;
  }

  .item-title {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .item-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .item-val {
    font-weight: 600;
    font-size: 15px;
  }

  /* Modals */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .close-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

  <!-- OVERVIEW PANEL -->
  <div class="lg-panel active" id="panel-overview">
    <div class="lg-card">
      <div class="stat-box">
        <div class="stat-label">Total Budget</div>
        <div class="stat-value" id="lg-total-budget">$0.00</div>
      </div>
      <div class="stat-grid">
        <div>
          <div class="sub-stat-label">Income</div>
          <div class="sub-stat-value income-text" id="lg-income-val">$0.00</div>
        </div>
        <div>
          <div class="sub-stat-label">Expenditure</div>
          <div class="sub-stat-value expense-text" id="lg-expenditure-val">$0.00</div>
        </div>
      </div>
    </div>

    <div class="lg-card">
      <h2>Calendar</h2>
      <div class="cal-header" id="cal-month-year">July 2026</div>
      <div class="cal-grid" id="lg-calendar-grid"></div>
    </div>

    <div class="lg-card">
      <h2>Spending Breakdown</h2>
      <div class="chart-container">
        <canvas id="overviewPieChart"></canvas>
      </div>
    </div>
  </div>

  <!-- BUDGET PANEL -->
  <div class="lg-panel" id="panel-budget">
    <div class="lg-card">
      <h2>Add Income / Expense</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Type</label>
          <select id="lg-budget-type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="field-group">
          <label>Category</label>
          <select id="lg-budget-cat-select"></select>
        </div>
        <div class="field-group">
          <label>Amount</label>
          <input type="number" id="lg-budget-amount" placeholder="0.00">
        </div>
        <button class="lg-btn primary" onclick="addBudgetItem()">Add Entry</button>
      </div>
    </div>

    <div class="lg-card">
      <h2>Categories & Progress</h2>
      <div class="lg-form" style="margin-bottom: 20px;">
        <div class="field-group">
          <label>Category Name</label>
          <input type="text" id="lg-new-cat-name" placeholder="e.g. Subscriptions">
        </div>
        <div class="field-row">
          <div class="field-group">
            <label>Target Budget</label>
            <input type="number" id="lg-new-cat-limit" placeholder="500.00">
          </div>
          <div class="field-group" style="max-width: 70px;">
            <label>Color</label>
            <input type="color" id="lg-new-cat-color" value="#e5c158">
          </div>
        </div>
        <button class="lg-btn secondary" onclick="addCategory()">Add Category</button>
      </div>

      <div id="budget-progress-container"></div>
    </div>
  </div>

  <!-- BILLS PANEL -->
  <div class="lg-panel" id="panel-bills">
    <div class="lg-card">
      <div class="pill-tabs">
        <button class="pill-tab active" id="tab-btn-upcoming" onclick="switchBillTab('upcoming')">Upcoming</button>
        <button class="pill-tab" id="tab-btn-new" onclick="switchBillTab('new')">New Bill</button>
      </div>

      <div id="view-bills-upcoming">
        <div class="list-wrapper" id="lg-bills-list"></div>
      </div>

      <div id="view-bills-new" style="display: none;">
        <div class="lg-form">
          <div class="field-group">
            <label>Bill Name</label>
            <input type="text" id="lg-bill-name" placeholder="e.g. Internet / Rent">
          </div>
          <div class="field-group">
            <label>Category</label>
            <select id="lg-bill-cat-select"></select>
          </div>
          <div class="field-group">
            <label>Amount</label>
            <input type="number" id="lg-bill-amount" placeholder="0.00">
          </div>
          <div class="field-group">
            <label>Due Date</label>
            <input type="date" id="lg-bill-date">
          </div>
          <div class="field-group">
            <label>Frequency</label>
            <select id="lg-bill-freq">
              <option value="once">Once</option>
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <button class="lg-btn primary" onclick="addBill()">Save Bill</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ACCOUNTS PANEL -->
  <div class="lg-panel" id="panel-accounts">
    <div class="lg-card">
      <h2>Accounts</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Bank</label>
          <input type="text" id="lg-acc-bank" placeholder="e.g. First Citizens">
        </div>
        <div class="field-group">
          <label>Account Number</label>
          <input type="text" id="lg-acc-number" placeholder="e.g. 000000000000">
        </div>
        <div class="field-group">
          <label>Balance</label>
          <input type="number" id="lg-acc-balance" placeholder="0.00">
        </div>
        <button class="lg-btn secondary" onclick="addAccount()">Add Account</button>
      </div>

      <div class="list-wrapper" id="lg-accounts-list"></div>
    </div>
  </div>

  <!-- DEBT & ASSETS PANEL -->
  <div class="lg-panel" id="panel-debt">
    <div class="lg-card">
      <h2>Debt Tracker</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Debt Name</label>
          <input type="text" id="lg-debt-name" placeholder="e.g. Credit Card / Loan">
        </div>
        <div class="field-group">
          <label>Total Balance</label>
          <input type="number" id="lg-debt-amount" placeholder="0.00">
        </div>
        <button class="lg-btn primary" onclick="addDebt()">Add Debt</button>
      </div>

      <div class="list-wrapper" id="lg-debt-list"></div>
    </div>

    <div class="lg-card">
      <h2>Assets Tracker</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Asset Name</label>
          <input type="text" id="lg-asset-name" placeholder="e.g. Emergency Fund / Toyota">
        </div>
        <div class="field-group">
          <label>Asset Type</label>
          <select id="lg-asset-type">
            <option value="Savings">Savings</option>
            <option value="Investments">Investments</option>
            <option value="House/Car">House/Car</option>
          </select>
        </div>
        <div class="field-group">
          <label>Estimated Value</label>
          <input type="number" id="lg-asset-amount" placeholder="0.00">
        </div>
        <button class="lg-btn primary" onclick="addAsset()">Add Asset</button>
      </div>

      <div class="list-wrapper" id="lg-asset-list"></div>
    </div>
  </div>

  <!-- CALENDAR POPUP MODAL -->
  <div class="modal-overlay" id="cal-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-date-title" style="margin:0;">Details</h2>
        <button class="close-btn" onclick="closeModal('cal-modal')">&times;</button>
      </div>
      <div id="modal-date-content" class="list-wrapper"></div>
    </div>
  </div>

  <!-- EDIT CATEGORY MODAL -->
  <div class="modal-overlay" id="edit-cat-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="edit-cat-title" style="margin:0;">Edit Category</h2>
        <button class="close-btn" onclick="closeModal('edit-cat-modal')">&times;</button>
      </div>
      <div class="lg-form">
        <input type="hidden" id="edit-cat-original-name">
        <div class="field-group">
          <label>Target Budget Limit</label>
          <input type="number" id="edit-cat-limit" placeholder="0.00">
        </div>
        <button class="lg-btn primary" onclick="saveCategoryEdit()">Save Target</button>
        <button class="lg-btn danger" onclick="deleteCategoryFromModal()">Delete Category</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchMainTab('overview', this)">Overview</button>
    <button class="nav-btn" onclick="switchMainTab('budget', this)">Budget</button>
    <button class="nav-btn" onclick="switchMainTab('bills', this)">Bills</button>
    <button class="nav-btn" onclick="switchMainTab('accounts', this)">Accounts</button>
    <button class="nav-btn" onclick="switchMainTab('debt', this)">Debt</button>
  </div>

<script>
  // App Data Store
  let bills = [];
  let accounts = [];
  let debts = [];
  let assets = [];
  let budgetEntries = [];
  let categories = {
    Housing: { limit: 1500, color: '#f2efe9' },
    Food: { limit: 600, color: '#e5c158' },
    Utilities: { limit: 400, color: '#ff453a' },
    Entertainment: { limit: 300, color: '#34c759' },
    Personal: { limit: 300, color: '#8e8e93' }
  };
  let pieChart = null;

  // Bottom Navigation Controller
  function switchMainTab(tabId, btnElement) {
    document.querySelectorAll('.bottom-nav .nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.lg-panel').forEach(p => p.classList.remove('active'));
    
    btnElement.classList.add('active');
    document.getElementById(`panel-${tabId}`).classList.add('active');

    if (tabId === 'overview') {
      renderCalendar();
      updateOverviewStats();
      renderPieChart();
    } else if (tabId === 'budget') {
      updateCategorySelectOptions();
      renderBudgetProgress();
    } else if (tabId === 'bills') {
      updateCategorySelectOptions();
    }
  }

  // Bill Pill Tabs Switcher
  function switchBillTab(tabType) {
    document.getElementById('tab-btn-upcoming').classList.toggle('active', tabType === 'upcoming');
    document.getElementById('tab-btn-new').classList.toggle('active', tabType === 'new');

    document.getElementById('view-bills-upcoming').style.display = tabType === 'upcoming' ? 'block' : 'none';
    document.getElementById('view-bills-new').style.display = tabType === 'new' ? 'block' : 'none';

    if (tabType === 'upcoming') {
      renderBillsList();
    }
  }

  // Modals
  function closeModal(modalId) {
    document.getElementById(modalId).classList.remove('active');
  }

  // Add Bill
  function addBill() {
    const name = document.getElementById('lg-bill-name').value.trim();
    const cat = document.getElementById('lg-bill-cat-select').value;
    const amount = parseFloat(document.getElementById('lg-bill-amount').value) || 0;
    const date = document.getElementById('lg-bill-date').value;
    const freq = document.getElementById('lg-bill-freq').value;

    if (!name || !date || !amount) return;

    bills.push({ id: Date.now(), name, cat, amount, date, freq });

    document.getElementById('lg-bill-name').value = '';
    document.getElementById('lg-bill-amount').value = '';
    document.getElementById('lg-bill-date').value = '';

    switchBillTab('upcoming');
    updateOverviewStats();
  }

  function renderBillsList() {
    const list = document.getElementById('lg-bills-list');
    list.innerHTML = '';

    if (bills.length === 0) {
      list.innerHTML = '<div style="text-align:center; color: var(--text-secondary); font-size: 14px; padding: 20px;">No upcoming expenses</div>';
      return;
    }

    bills.sort((a, b) => new Date(a.date) - new Date(b.date));

    bills.forEach(b => {
      const catColor = categories[b.cat]?.color || '#8e8e93';
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div>
          <div class="item-title">
            <span class="color-indicator" style="background-color: ${catColor};"></span>
            ${b.name}
          </div>
          <div class="item-sub">Due: ${b.date} • Recurs: ${b.freq.charAt(0).toUpperCase() + b.freq.slice(1)}</div>
        </div>
        <div class="item-val">$${b.amount.toFixed(2)}</div>
      `;
      list.appendChild(item);
    });
  }

  // Categories & Budget Progress Management
  function addCategory() {
    const name = document.getElementById('lg-new-cat-name').value.trim();
    const limit = parseFloat(document.getElementById('lg-new-cat-limit').value) || 0;
    const color = document.getElementById('lg-new-cat-color').value;

    if (!name || limit <= 0) return;

    categories[name] = { limit, color };

    document.getElementById('lg-new-cat-name').value = '';
    document.getElementById('lg-new-cat-limit').value = '';

    updateCategorySelectOptions();
    renderBudgetProgress();
  }

  function openEditCategoryModal(catName) {
    document.getElementById('edit-cat-title').innerText = `Edit ${catName}`;
    document.getElementById('edit-cat-original-name').value = catName;
    document.getElementById('edit-cat-limit').value = categories[catName].limit;
    document.getElementById('edit-cat-modal').classList.add('active');
  }

  function saveCategoryEdit() {
    const catName = document.getElementById('edit-cat-original-name').value;
    const limit = parseFloat(document.getElementById('edit-cat-limit').value) || 0;

    if (limit > 0 && categories[catName]) {
      categories[catName].limit = limit;
      renderBudgetProgress();
    }
    closeModal('edit-cat-modal');
  }

  function deleteCategoryFromModal() {
    const catName = document.getElementById('edit-cat-original-name').value;
    delete categories[catName];
    updateCategorySelectOptions();
    renderBudgetProgress();
    closeModal('edit-cat-modal');
  }

  function updateCategorySelectOptions() {
    const bSelect = document.getElementById('lg-budget-cat-select');
    const billSelect = document.getElementById('lg-bill-cat-select');
    
    bSelect.innerHTML = '';
    billSelect.innerHTML = '';

    Object.keys(categories).forEach(cat => {
      const opt1 = document.createElement('option');
      opt1.value = cat;
      opt1.innerText = cat;
      bSelect.appendChild(opt1);

      const opt2 = document.createElement('option');
      opt2.value = cat;
      opt2.innerText = cat;
      billSelect.appendChild(opt2);
    });
  }

  function renderBudgetProgress() {
    const container = document.getElementById('budget-progress-container');
    container.innerHTML = '';

    Object.keys(categories).forEach(cat => {
      const catData = categories[cat];
      const limit = catData.limit;
      const spent = budgetEntries
        .filter(e => e.type === 'expense' && e.cat === cat)
        .reduce((sum, e) => sum + e.amount, 0) + 
        bills.filter(b => b.cat === cat).reduce((sum, b) => sum + b.amount, 0);

      const percentage = Math.min((spent / limit) * 100, 100);

      const div = document.createElement('div');
      div.className = 'budget-item';
      div.innerHTML = `
        <div class="budget-header">
          <div class="cat-dot-label">
            <span class="color-indicator" style="background-color: ${catData.color}"></span>
            <span>${cat}</span>
          </div>
          <div>
            <span style="margin-right: 8px;">$${spent.toFixed(2)} / $${limit.toFixed(2)}</span>
            <button class="lg-btn edit-sm" onclick="openEditCategoryModal('${cat}')">Edit</button>
          </div>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width: ${percentage}%; background-color: ${catData.color}"></div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  // Add Income / Expense
  function addBudgetItem() {
    const type = document.getElementById('lg-budget-type').value;
    const cat = document.getElementById('lg-budget-cat-select').value;
    const amount = parseFloat(document.getElementById('lg-budget-amount').value) || 0;

    if (!amount || !cat) return;

    budgetEntries.push({ id: Date.now(), type, cat, amount });
    document.getElementById('lg-budget-amount').value = '';

    renderBudgetProgress();
    updateOverviewStats();
  }

  // Accounts Management
  function addAccount() {
    const bank = document.getElementById('lg-acc-bank').value.trim();
    const number = document.getElementById('lg-acc-number').value.trim();
    const balance = parseFloat(document.getElementById('lg-acc-balance').value) || 0;

    if (!bank || !number) return;

    accounts.push({ id: Date.now(), bank, number, balance });

    document.getElementById('lg-acc-bank').value = '';
    document.getElementById('lg-acc-number').value = '';
    document.getElementById('lg-acc-balance').value = '';

    renderAccounts();
  }

  function renderAccounts() {
    const list = document.getElementById('lg-accounts-list');
    list.innerHTML = '';

    accounts.forEach(a => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div>
          <div class="item-title">${a.bank}</div>
          <div class="item-sub">Acc: ${a.number}</div>
        </div>
        <div class="item-val">$${a.balance.toFixed(2)}</div>
      `;
      list.appendChild(item);
    });
  }

  // Debt & Asset Management
  function addDebt() {
    const name = document.getElementById('lg-debt-name').value.trim();
    const amount = parseFloat(document.getElementById('lg-debt-amount').value) || 0;

    if (!name || !amount) return;

    debts.push({ id: Date.now(), name, amount });

    document.getElementById('lg-debt-name').value = '';
    document.getElementById('lg-debt-amount').value = '';

    renderDebts();
  }

  function renderDebts() {
    const list = document.getElementById('lg-debt-list');
    list.innerHTML = '';

    debts.forEach(d => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div><div class="item-title">${d.name}</div></div>
        <div class="item-val expense-text">$${d.amount.toFixed(2)}</div>
      `;
      list.appendChild(item);
    });
  }

  function addAsset() {
    const name = document.getElementById('lg-asset-name').value.trim();
    const type = document.getElementById('lg-asset-type').value;
    const amount = parseFloat(document.getElementById('lg-asset-amount').value) || 0;

    if (!name || !amount) return;

    assets.push({ id: Date.now(), name, type, amount });

    document.getElementById('lg-asset-name').value = '';
    document.getElementById('lg-asset-amount').value = '';

    renderAssets();
  }

  function renderAssets() {
    const list = document.getElementById('lg-asset-list');
    list.innerHTML = '';

    assets.forEach(a => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div>
          <div class="item-title">${a.name}</div>
          <div class="item-sub">${a.type}</div>
        </div>
        <div class="item-val income-text">$${a.amount.toFixed(2)}</div>
      `;
      list.appendChild(item);
    });
  }

  // Stats Update
  function updateOverviewStats() {
    const income = budgetEntries.filter(e => e.type === 'income').reduce((sum, e) => sum + e.amount, 0);
    const expenses = budgetEntries.filter(e => e.type === 'expense').reduce((sum, e) => sum + e.amount, 0) + bills.reduce((sum, b) => sum + b.amount, 0);
    const totalBudget = income - expenses;

    document.getElementById('lg-total-budget').innerText = `$${totalBudget.toFixed(2)}`;
    document.getElementById('lg-income-val').innerText = `$${income.toFixed(2)}`;
    document.getElementById('lg-expenditure-val').innerText = `$${expenses.toFixed(2)}`;
  }

  // Pie Chart
  function renderPieChart() {
    const ctx = document.getElementById('overviewPieChart').getContext('2d');
    
    const catTotals = {};
    const catColors = [];

    budgetEntries.filter(e => e.type === 'expense').forEach(e => {
      catTotals[e.cat] = (catTotals[e.cat] || 0) + e.amount;
    });

    bills.forEach(b => {
      catTotals[b.cat] = (catTotals[b.cat] || 0) + b.amount;
    });

    const labels = Object.keys(catTotals);
    const data = Object.values(catTotals);

    labels.forEach(l => {
      catColors.push(categories[l]?.color || '#8e8e93');
    });

    if (pieChart) pieChart.destroy();

    pieChart = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels.length ? labels : ['No Expenses'],
        datasets: [{
          data: data.length ? data : [1],
          backgroundColor: catColors.length ? catColors : ['#2c2c2e'],
          borderWidth: 0
        }]
      },
      options: {
        plugins: {
          legend: {
            labels: { color: '#8e8e93', font: { family: 'SF Pro Display' } }
          }
        }
      }
    });
  }

  // Calendar
  function renderCalendar() {
    const grid = document.getElementById('lg-calendar-grid');
    grid.innerHTML = '';

    const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    dayNames.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.innerText = d;
      grid.appendChild(el);
    });

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById('cal-month-year').innerText = `${monthNames[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      cell.innerText = day;

      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const dayBills = bills.filter(b => b.date === dateStr);

      if (dayBills.length > 0) {
        const dotsContainer = document.createElement('div');
        dotsContainer.className = 'cal-dots-container';

        dayBills.slice(0, 3).forEach(b => {
          const dot = document.createElement('div');
          dot.className = 'cal-dot';
          dot.style.backgroundColor = categories[b.cat]?.color || '#8e8e93';
          dotsContainer.appendChild(dot);
        });

        cell.appendChild(dotsContainer);
      }

      cell.onclick = () => openDayModal(dateStr, dayBills);

      grid.appendChild(cell);
    }
  }

  function openDayModal(dateStr, dayBills) {
    document.getElementById('modal-date-title').innerText = dateStr;
    const content = document.getElementById('modal-date-content');
    content.innerHTML = '';

    if (dayBills.length === 0) {
      content.innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 12px;">No bills due on this date.</div>';
    } else {
      dayBills.forEach(b => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
          <div>
            <div class="item-title">
              <span class="color-indicator" style="background-color: ${categories[b.cat]?.color || '#8e8e93'};"></span>
              ${b.name}
            </div>
            <div class="item-sub">${b.cat || 'Uncategorized'} • ${b.freq}</div>
          </div>
          <div class="item-val">$${b.amount.toFixed(2)}</div>
        `;
        content.appendChild(item);
      });
    }

    document.getElementById('cal-modal').classList.add('active');
  }

  // Initial Load Setup
  updateCategorySelectOptions();
  renderCalendar();
  renderPieChart();
</script>
</body>
</html>
