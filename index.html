<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Ledger</title>
<!-- Chart.js for Overview Pie Charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg-color: #0d0d0d;
    --card-bg: #18181a;
    --card-border: #26262a;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --accent-cream: #f2efe9;
    --accent-dark: #000000;
    --dot-color: #e5c158;
    --progress-bg: #2c2c2e;
    --progress-fill: #f2efe9;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    padding: 20px 16px 40px;
    max-width: 600px;
    margin: 0 auto;
    font-variant-numeric: normal;
    font-feature-settings: "zero" 0;
  }

  /* Navigation Tabs Header */
  .nav-tabs {
    display: flex;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
    overflow-x: auto;
  }

  .nav-btn {
    flex: 1;
    padding: 10px 12px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 13px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
  }

  .nav-btn.active {
    background: var(--accent-cream);
    color: var(--accent-dark);
  }

  /* Panels & Cards */
  .lg-panel {
    display: none;
    flex-direction: column;
    gap: 16px;
  }

  .lg-panel.active {
    display: flex;
  }

  .lg-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 20px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-primary);
  }

  /* Overview Financial Summary */
  .stat-box {
    text-align: center;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--card-border);
  }

  .stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
    text-align: center;
  }

  .sub-stat-label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .sub-stat-value {
    font-size: 18px;
    font-weight: 600;
    margin-top: 2px;
  }

  .income-text { color: #34c759; }
  .expense-text { color: #ff453a; }

  /* Calendar */
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    text-align: center;
  }

  .cal-day-name {
    font-size: 11px;
    color: var(--text-secondary);
    padding-bottom: 4px;
  }

  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #101012;
    font-size: 13px;
    position: relative;
  }

  .cal-cell.empty { background: transparent; }

  .cal-dot {
    width: 4px;
    height: 4px;
    background-color: var(--dot-color);
    border-radius: 50%;
    position: absolute;
    bottom: 4px;
  }

  /* Pie Charts Styling */
  .chart-container {
    position: relative;
    max-width: 260px;
    margin: 0 auto;
  }

  /* Budget Progress Bar Styling */
  .budget-item {
    margin-bottom: 16px;
  }

  .budget-header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 8px;
    background: var(--progress-bg);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--progress-fill);
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  /* Forms & Inputs */
  .lg-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input, select {
    width: 100%;
    padding: 12px 14px;
    background: #000000;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    font-variant-numeric: normal;
    font-feature-settings: 'zero' 0;
  }

  input:focus, select:focus {
    border-color: var(--text-secondary);
  }

  .lg-btn {
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s ease;
  }

  .lg-btn.primary {
    background: var(--accent-cream);
    color: var(--accent-dark);
  }

  .lg-btn.secondary {
    background: #2c2c2e;
    color: var(--text-primary);
  }

  .lg-btn:hover { opacity: 0.9; }

  /* Pill Tabs (Bills) */
  .pill-tabs {
    display: flex;
    background-color: #000000;
    border-radius: 999px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 16px;
    border: 1px solid var(--card-border);
  }

  .pill-tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: var(--text-secondary);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .pill-tab.active {
    background-color: var(--accent-cream);
    color: var(--accent-dark);
  }

  /* List Items */
  .list-wrapper {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
  }

  .list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #101012;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #1f1f22;
  }

  .item-title {
    font-weight: 600;
    font-size: 15px;
  }

  .item-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .item-val {
    font-weight: 600;
    font-size: 15px;
  }
</style>
</head>
<body>

  <!-- Top View Navigation Header -->
  <div class="nav-tabs">
    <button class="nav-btn active" onclick="switchMainTab('overview', this)">Overview</button>
    <button class="nav-btn" onclick="switchMainTab('budget', this)">Budget</button>
    <button class="nav-btn" onclick="switchMainTab('bills', this)">Bills</button>
    <button class="nav-btn" onclick="switchMainTab('accounts', this)">Accounts</button>
    <button class="nav-btn" onclick="switchMainTab('debt', this)">Debt</button>
  </div>

  <!-- OVERVIEW PANEL -->
  <div class="lg-panel active" id="panel-overview">
    <!-- Total Budget Stat Box with Income & Expenditure -->
    <div class="lg-card">
      <div class="stat-box">
        <div class="stat-label">Total Budget</div>
        <div class="stat-value" id="lg-total-budget">$0.00</div>
      </div>
      <div class="stat-grid">
        <div>
          <div class="sub-stat-label">Income</div>
          <div class="sub-stat-value income-text" id="lg-income-val">$0.00</div>
        </div>
        <div>
          <div class="sub-stat-label">Expenditure</div>
          <div class="sub-stat-value expense-text" id="lg-expenditure-val">$0.00</div>
        </div>
      </div>
    </div>

    <!-- Dynamic Read-only Calendar -->
    <div class="lg-card">
      <h2>Calendar</h2>
      <div class="cal-header" id="cal-month-year">July 2026</div>
      <div class="cal-grid" id="lg-calendar-grid"></div>
    </div>

    <!-- Pie Chart Breakdown -->
    <div class="lg-card">
      <h2>Spending Breakdown</h2>
      <div class="chart-container">
        <canvas id="overviewPieChart"></canvas>
      </div>
    </div>
  </div>

  <!-- BUDGET PANEL -->
  <div class="lg-panel" id="panel-budget">
    <div class="lg-card">
      <h2>Add Income / Expense</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Type</label>
          <select id="lg-budget-type">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="field-group">
          <label>Category</label>
          <select id="lg-budget-cat">
            <option value="Housing">Housing</option>
            <option value="Food">Food</option>
            <option value="Utilities">Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Personal">Personal</option>
          </select>
        </div>
        <div class="field-group">
          <label>Amount</label>
          <input type="number" id="lg-budget-amount" placeholder="0.00">
        </div>
        <button class="lg-btn primary" onclick="addBudgetItem()">Add Entry</button>
      </div>
    </div>

    <!-- Budget Categories with Progress Bars -->
    <div class="lg-card">
      <h2>Category Progress</h2>
      <div id="budget-progress-container">
        <!-- Progress Bars Injected via JS -->
      </div>
    </div>
  </div>

  <!-- BILLS PANEL -->
  <div class="lg-panel" id="panel-bills">
    <div class="lg-card">
      <!-- Segmented Pill Tabs -->
      <div class="pill-tabs">
        <button class="pill-tab active" id="tab-btn-upcoming" onclick="switchBillTab('upcoming')">Upcoming</button>
        <button class="pill-tab" id="tab-btn-recurring" onclick="switchBillTab('recurring')">Recurring</button>
      </div>

      <div class="lg-form">
        <div class="field-group">
          <label>Bill Name</label>
          <input type="text" id="lg-bill-name" placeholder="e.g. Internet / Rent">
        </div>
        <div class="field-group">
          <label>Amount</label>
          <input type="number" id="lg-bill-amount" placeholder="0.00">
        </div>
        <div class="field-group">
          <label>Due Date</label>
          <input type="date" id="lg-bill-date">
        </div>
        <div class="field-group">
          <label>Frequency</label>
          <select id="lg-bill-freq">
            <option value="once">Once</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
        <button class="lg-btn primary" onclick="addBill()">Add Bill</button>
      </div>

      <div class="list-wrapper" id="lg-bills-list"></div>
    </div>
  </div>

  <!-- ACCOUNTS PANEL -->
  <div class="lg-panel" id="panel-accounts">
    <div class="lg-card">
      <h2>Accounts</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Bank</label>
          <input type="text" id="lg-acc-bank" placeholder="e.g. First Citizens">
        </div>
        <div class="field-group">
          <label>Account Number</label>
          <input type="text" id="lg-acc-number" placeholder="e.g. 000000000000">
        </div>
        <button class="lg-btn secondary" onclick="addAccount()">Add Account</button>
      </div>

      <div class="list-wrapper" id="lg-accounts-list"></div>
    </div>
  </div>

  <!-- DEBT PANEL -->
  <div class="lg-panel" id="panel-debt">
    <div class="lg-card">
      <h2>Debt Tracker</h2>
      <div class="lg-form">
        <div class="field-group">
          <label>Debt Name</label>
          <input type="text" id="lg-debt-name" placeholder="e.g. Credit Card / Loan">
        </div>
        <div class="field-group">
          <label>Total Balance</label>
          <input type="number" id="lg-debt-amount" placeholder="0.00">
        </div>
        <button class="lg-btn primary" onclick="addDebt()">Add Debt</button>
      </div>

      <div class="list-wrapper" id="lg-debt-list"></div>
    </div>
  </div>

<script>
  // Data Store
  let bills = [];
  let accounts = [];
  let debts = [];
  let budgetEntries = [];
  let categoryLimits = { Housing: 1500, Food: 600, Utilities: 400, Entertainment: 300, Personal: 300 };
  let activeBillTab = 'upcoming';
  let pieChart = null;

  // Navigation Controller
  function switchMainTab(tabId, btnElement) {
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.lg-panel').forEach(p => p.classList.remove('active'));
    
    btnElement.classList.add('active');
    document.getElementById(`panel-${tabId}`).classList.add('active');

    if (tabId === 'overview') {
      renderCalendar();
      updateOverviewStats();
      renderPieChart();
    } else if (tabId === 'budget') {
      renderBudgetProgress();
    }
  }

  // Bill Pill Tabs Switcher
  function switchBillTab(type) {
    activeBillTab = type;
    document.getElementById('tab-btn-upcoming').classList.toggle('active', type === 'upcoming');
    document.getElementById('tab-btn-recurring').classList.toggle('active', type === 'recurring');
    renderBills();
  }

  // Add Bill
  function addBill() {
    const name = document.getElementById('lg-bill-name').value.trim();
    const amount = parseFloat(document.getElementById('lg-bill-amount').value) || 0;
    const date = document.getElementById('lg-bill-date').value;
    const freq = document.getElementById('lg-bill-freq').value;

    if (!name || !date || !amount) return;

    bills.push({ id: Date.now(), name, amount, date, freq });

    document.getElementById('lg-bill-name').value = '';
    document.getElementById('lg-bill-amount').value = '';
    document.getElementById('lg-bill-date').value = '';

    renderBills();
    updateOverviewStats();
  }

  function renderBills() {
    const list = document.getElementById('lg-bills-list');
    list.innerHTML = '';

    const filtered = bills.filter(b => activeBillTab === 'recurring' ? b.freq !== 'once' : b.freq === 'once');

    filtered.forEach(b => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div>
          <div class="item-title">${b.name}</div>
          <div class="item-sub">${b.date} • ${b.freq.charAt(0).toUpperCase() + b.freq.slice(1)}</div>
        </div>
        <div class="item-val">$${b.amount.toFixed(2)}</div>
      `;
      list.appendChild(item);
    });
  }

  // Add Account (Bank & Number Only)
  function addAccount() {
    const bank = document.getElementById('lg-acc-bank').value.trim();
    const number = document.getElementById('lg-acc-number').value.trim();

    if (!bank || !number) return;

    accounts.push({ id: Date.now(), bank, number });

    document.getElementById('lg-acc-bank').value = '';
    document.getElementById('lg-acc-number').value = '';

    renderAccounts();
  }

  function renderAccounts() {
    const list = document.getElementById('lg-accounts-list');
    list.innerHTML = '';

    accounts.forEach(a => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div>
          <div class="item-title">${a.bank}</div>
          <div class="item-sub">Acc: ${a.number}</div>
        </div>
      `;
      list.appendChild(item);
    });
  }

  // Add Debt
  function addDebt() {
    const name = document.getElementById('lg-debt-name').value.trim();
    const amount = parseFloat(document.getElementById('lg-debt-amount').value) || 0;

    if (!name || !amount) return;

    debts.push({ id: Date.now(), name, amount });

    document.getElementById('lg-debt-name').value = '';
    document.getElementById('lg-debt-amount').value = '';

    renderDebts();
  }

  function renderDebts() {
    const list = document.getElementById('lg-debt-list');
    list.innerHTML = '';

    debts.forEach(d => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.innerHTML = `
        <div><div class="item-title">${d.name}</div></div>
        <div class="item-val expense-text">$${d.amount.toFixed(2)}</div>
      `;
      list.appendChild(item);
    });
  }

  // Add Income / Expense in Budget Section
  function addBudgetItem() {
    const type = document.getElementById('lg-budget-type').value;
    const cat = document.getElementById('lg-budget-cat').value;
    const amount = parseFloat(document.getElementById('lg-budget-amount').value) || 0;

    if (!amount) return;

    budgetEntries.push({ id: Date.now(), type, cat, amount });
    document.getElementById('lg-budget-amount').value = '';

    renderBudgetProgress();
    updateOverviewStats();
  }

  function renderBudgetProgress() {
    const container = document.getElementById('budget-progress-container');
    container.innerHTML = '';

    Object.keys(categoryLimits).forEach(cat => {
      const limit = categoryLimits[cat];
      const spent = budgetEntries
        .filter(e => e.type === 'expense' && e.cat === cat)
        .reduce((sum, e) => sum + e.amount, 0);

      const percentage = Math.min((spent / limit) * 100, 100);

      const div = document.createElement('div');
      div.className = 'budget-item';
      div.innerHTML = `
        <div class="budget-header">
          <span>${cat}</span>
          <span>$${spent.toFixed(2)} / $${limit.toFixed(2)}</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width: ${percentage}%;"></div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  // Update Stats Box
  function updateOverviewStats() {
    const income = budgetEntries.filter(e => e.type === 'income').reduce((sum, e) => sum + e.amount, 0);
    const expenses = budgetEntries.filter(e => e.type === 'expense').reduce((sum, e) => sum + e.amount, 0) + bills.reduce((sum, b) => sum + b.amount, 0);
    const totalBudget = income - expenses;

    document.getElementById('lg-total-budget').innerText = `$${totalBudget.toFixed(2)}`;
    document.getElementById('lg-income-val').innerText = `$${income.toFixed(2)}`;
    document.getElementById('lg-expenditure-val').innerText = `$${expenses.toFixed(2)}`;
  }

  // Render Overview Pie Chart
  function renderPieChart() {
    const ctx = document.getElementById('overviewPieChart').getContext('2d');
    
    // Group spending by category
    const catTotals = {};
    budgetEntries.filter(e => e.type === 'expense').forEach(e => {
      catTotals[e.cat] = (catTotals[e.cat] || 0) + e.amount;
    });

    const labels = Object.keys(catTotals).length ? Object.keys(catTotals) : ['No Data'];
    const data = Object.keys(catTotals).length ? Object.values(catTotals) : [1];
    const colors = ['#f2efe9', '#e5c158', '#8e8e93', '#ff453a', '#34c759'];

    if (pieChart) pieChart.destroy();

    pieChart = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors,
          borderWidth: 0
        }]
      },
      options: {
        plugins: {
          legend: {
            labels: { color: '#8e8e93', font: { family: 'SF Pro Display' } }
          }
        }
      }
    });
  }

  // Render Calendar and sync bill dots
  function renderCalendar() {
    const grid = document.getElementById('lg-calendar-grid');
    grid.innerHTML = '';

    const dayNames = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    dayNames.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.innerText = d;
      grid.appendChild(el);
    });

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById('cal-month-year').innerText = `${monthNames[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      grid.appendChild(empty);
    }

    for (let day = 1; day <= totalDays; day++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      cell.innerText = day;

      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const hasBill = bills.some(b => b.date === dateStr);

      if (hasBill) {
        const dot = document.createElement('div');
        dot.className = 'cal-dot';
        cell.appendChild(dot);
      }

      grid.appendChild(cell);
    }
  }

  // Initial Load
  renderCalendar();
  renderPieChart();
</script>
</body>
</html>
